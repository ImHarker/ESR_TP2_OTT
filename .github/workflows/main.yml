name: Mirror to Public Repo

on:
  push:
    branches:
      - main  # Branch to monitor for pushes

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout private repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0  # Fetch all history for accurate commit history

    - name: Set up Git for pushing to public repo
      run: |
        git config user.name "ImHarker"
        git config user.email "pg55096@uminho.pt"
    
    - name: Update commit author and committer info
      run: |
        git filter-branch --env-filter '
        if [ "$GIT_AUTHOR_NAME" != "ImHarker" ]; then
            GIT_AUTHOR_NAME="ImHarker"
            GIT_AUTHOR_EMAIL="pg55096@uminho.pt"
            GIT_COMMITTER_NAME="ImHarker"
            GIT_COMMITTER_EMAIL="pg55096@uminho.pt"
        fi
        ' --tag-name-filter cat -- --branches --tags

    - name: Temporarily remove .github/workflows directory
      run: rm -rf .github/workflows

    - name: Add public repo as remote
      run: |
        git remote add public https://github.com/ImHarker/ESR_OTT_TP2.git
        git fetch public

    - name: Push to public repository without workflows
      run: |
        git push --mirror public
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Restore workflows directory for private repository
      if: always()
      run: git checkout HEAD .github/workflows
